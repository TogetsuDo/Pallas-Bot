# 复制为 config/pallas.toml 后填写（勿提交密钥）。
# 插件与通用项在 WebUI 保存 → data/pallas_config/webui.json（优先级最高）。
# 说明：docs/architecture/settings-storage.md · 从旧 .env 迁移：uv run python tools/migrate_env_to_pallas.py

# ── 最少配置（改 superusers + 数据库即可启动）────────────────────────
[bootstrap]
host = "0.0.0.0"
port = 8088
superusers = ["你的QQ号"]
db_backend = "mongodb" # 或 postgresql

[bootstrap.mongo]
host = "127.0.0.1"
port = 27017
db = "PallasBot"
# user / password / auth_source 有认证时再填

# ── 按需取消注释 ────────────────────────────────────────────────────
# log_level = "INFO"
# access_token = ""              # 公网暴露 HTTP 时建议设置
# extra_plugin_dirs = ["local/plugins"]   # 未配置时，local/plugins 有有效插件包会自动纳入
# load_bundled_extra_plugins = "auto"      # true | false | auto（默认 auto：pip 未装时用仓库内副本）

# [bootstrap.postgres]
# host = "127.0.0.1"
# port = 5432
# user = "postgres"
# password = ""
# db = "PallasBot"

# [community_stats]
# enabled = false                # 默认开启；仅关闭上报时取消注释

# [env]
# REDIS_URL = "redis://127.0.0.1:6379/0"   # 分片多进程 claim；需 uv sync --extra coord-redis

# 多机协同、语料联邦、PG 连接池等进阶项见 docs/Config.md，一般无需写进 pallas.toml。
