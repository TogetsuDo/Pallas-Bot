# 复制为 config/pallas.toml 后填写（该文件已 gitignore，勿提交密钥）。
# WebUI「插件 / 通用配置」保存项写入 data/pallas_config/webui.json；保存后会自动生成只读 config/pallas.webui.export.toml 供查阅。
# 从旧 .env 迁移：uv run python tools/migrate_env_to_pallas.py

[bootstrap]
host = "0.0.0.0"
port = 8088
# superusers = ["123456789"]
db_backend = "mongodb"
# access_token = ""

[bootstrap.mongo]
host = "127.0.0.1"
port = 27017
user = ""
password = ""
db = "PallasBot"
# auth_source = ""

# [bootstrap.postgres]
# host = "127.0.0.1"
# port = 5432
# user = "postgres"
# password = ""
# db = "PallasBot"

# 社区统计（opt-in 心跳，默认开启；关闭设 enabled = false）
[community_stats]
enabled = true
endpoint = "https://stats.pallasbot.top/v1/heartbeat"
# token = ""  # 与中心 HEARTBEAT_TOKEN 一致；生产请填写
interval_sec = 300

# 与历史 .env 同名的扁平项（键名大写）；也可只放 bootstrap，其余交给 WebUI。
# [env]
# PALLAS_PROTOCOL_ENABLED = true
