name: Publish pallas-core PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Verify tag matches pallas version
        if: github.event_name == 'push'
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/v}"
          VER="$(uv run python -c "import sys; sys.path.insert(0, 'pallas'); from pallas import __version__; print(__version__)")"
          if [ "${TAG}" != "${VER}" ]; then
            echo "::error::tag v${TAG} 与 pallas.__version__ ${VER} 不一致"
            exit 1
          fi

      - name: Build pallas-core wheel
        run: ./scripts/build_core.sh

      - name: Verify wheel contains pallas package
        run: |
          set -euo pipefail
          WHEEL="$(ls build/pallas-core/dist/*.whl)"
          if ! unzip -l "${WHEEL}" | grep -q 'pallas/__init__\.py'; then
            echo "::error::wheel 缺少 pallas 包"
            exit 1
          fi

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: build/pallas-core/dist/
