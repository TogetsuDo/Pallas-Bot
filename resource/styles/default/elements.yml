enable: true # 是否启用元素生成背景

# 多帧背景 GIF（pillowmd）：取消注释后为 GIF；imgs 内需有 nine_lu_1.png / nine_lu_2.png … 与 lock 规则，详见库 README
# page: 3
# duratio: 0.5
# playbackSequence: "1 2 3"

background: # 背景配置

  # 1：九宫格；四边平铺/智能平铺，角不拉伸，中间可平铺，避免整张 background.png 拉伸导致边框与角色变形
  mode: 1

  data:
    left-up: "nine_lu.png"
    up: "nine_u.png"
    right-up: "nine_ru.png"
    left: "nine_l.png"
    middle: "nine_m.png"
    right: "nine_r.png"
    left-down: "nine_ld.png"
    down: "nine_d.png"
    right-down: "nine_rd.png"

    lu-lock: false
    l-lock: false
    ld-lock: false
    u-lock: false
    d-lock: false
    ru-lock: false
    r-lock: false
    rd-lock: false
    m-lock: false

    # 左右 / 上下边条：2 智能填铺（花纹不随画布单向拉长）
    lr-mode: 2
    ud-mode: 2
    # 中间为纯色块时：0 拉伸一块即可；若改回纹理 middle 可用 1/2
    middle-mode: 0

  # 以下为旧版单图拉伸（保留注释便于回退；使用 mode:1 时勿同时启用下方整块）
  # mode: 0
  # data:
  #   img: "background.png"
  #   lock: false
  #   mode: 0


decorates: # 装饰配置

  # top和bottom是两个独立的装饰层，都是可选项

  top: # 渲染在顶部图层（文本之上）

    # 装饰图片配置，9个部分的元素都是可选项，每个部分可以有多个装饰

    left-up: [] # 左上角装饰图片
      # - img: "top-left-up.png" # 左上角装饰图片
      #   mode: 0 # 0:不会经过任何缩放，直接放置在对应区域
      #   # include: false # 可以为`false`或者`true`，表示是否不超过边框（九图填充模式下无效，因为没有边框），默认为`false`，可以手动填写为`true`
      #   # lock: false # 锁定该装饰图片，锁定后不会随编号变化而变化（同background中的锁定配置）
      # - img: "top-left-up.png" # 左上角装饰图片
      #   mode: 1 #1:会根据区域大小进行拉伸填充
      #   # 以下参数仅在mode=1时有效
      #   xlimit: 0.5 # x轴拉伸限制，0.2表示拉伸后x,y轴不会超过整张markdown图的20%
      #   ylimit: 0.5 # y轴拉伸限制，0.2表示拉伸后x,y轴不会超过整张markdown图的20%
      #   min: # 最小缩放大小（优先级比limit更高）
      #   max: # 最大缩放大小

    left: [] # 左侧装饰图片

    left-down: [] # 左下角装饰图片

    up: [] # 上侧装饰图片

    down: [] # 下侧装饰图片

    right-up: [] # 右上角装饰图片

    right: [] # 右侧装饰图片

    right-down: [] # 右下角装饰图片

    middle: [] # 中间装饰图片

  bottom: # 渲染在底部图层（背景之上，文本之下）

    # 装饰图片配置，9个部分的元素都是可选项，每个部分可以有多个装饰

    left-up: [] # 左上角装饰图片
      # - img: "top-left-up.png" # 左上角装饰图片
      #   mode: 0 # 0:不会经过任何缩放，直接放置在对应区域
      #   # include: false # 可以为`false`或者`true`，表示是否不超过边框（九图填充模式下无效，因为没有边框），默认为`false`，可以手动填写为`true`
      #   # lock: false # 锁定该装饰图片，锁定后不会随编号变化而变化（同background中的锁定配置）
      # - img: "top-left-up.png" # 左上角装饰图片
      #   mode: 1 #1:会根据区域大小进行拉伸填充
      #   # 以下参数仅在mode=1时有效
      #   xlimit: 0.5 # x轴拉伸限制，0.2表示拉伸后x,y轴不会超过整张markdown图的20%
      #   ylimit: 0.5 # y轴拉伸限制，0.2表示拉伸后x,y轴不会超过整张markdown图的20%
      #   min: # 最小缩放大小（优先级比limit更高）
      #   max: # 最大缩放大小

    left: [] # 左侧装饰图片

    left-down: [] # 左下角装饰图片

    up: [] # 上侧装饰图片

    down: [] # 下侧装饰图片

    right-up: [] # 右上角装饰图片

    right: [] # 右侧装饰图片

    # 右下角人物（勿在下面再写一遍 right-down，YAML 重复键会覆盖成空）
    # mode1：太小→略增大 xlimit/ylimit；与 paint 二选一时请注释本节并把 config side_paint_enabled 打开
    right-down:
      - img: "character.png"
        mode: 1
        xlimit: 0.28
        ylimit: 0.25
        include: true
        lock: false
    # right-down: []

    middle: [] # 中间装饰图片
