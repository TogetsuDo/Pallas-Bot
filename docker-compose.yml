# 默认：Pallas-Bot + MongoDB（3.x 升级用户沿用此栈）。
# 新装推荐 PostgreSQL + AI 全栈：docker-compose.full.yml（见 DockerDeployment.md）。
# NapCat 等由协议端管理（/protocol/console/）在宿主机或容器内拉起。
# Bot 主配置：挂载 pallas-bot/config/pallas.toml → /app/config/pallas.toml（见 config/pallas.example.toml）
# WebUI 插件配置：随 pallas-bot/data 卷持久化（data/pallas_config/webui.json）
# 使用内置 PostgreSQL：在 pallas.toml 配好 [bootstrap] / [bootstrap.postgres] 后执行：
#   docker compose --env-file ./pallas-bot/config/compose.env --profile postgres up -d
#（compose.env 由 config/compose.env.example 复制；postgres 从 PG_* 插值 POSTGRES_*）
# 固定项目名：避免工作目录名为中文等时，Compose 推导出的项目名为空而报错「project name must not be empty」
name: pallas-bot
services:
  pallasbot:
    container_name: pallasbot
    image: pallasbot/pallas-bot:latest
    restart: always
    ports:
      - 8088:8088
    environment:
      TZ: Asia/Shanghai
      ENVIRONMENT: prod
      APP_MODULE: bot:app
      MAX_WORKERS: 1
      # 与本 compose 内 mongodb 服务同网；容器内 127.0.0.1 不是宿主机也不是兄弟容器
      MONGO_HOST: mongodb
      MONGO_PORT: "27017"
      # 使用 --profile postgres 且 DB_BACKEND=postgresql 时连本编排内 postgres 服务；外置 PG 请删改这两项
      PG_HOST: postgres
      PG_PORT: "5432"
    networks:
      - pallasbot
    volumes:
      # 勿挂载整个 /app/resource，否则会盖住镜像内的 help 样式（resource/styles/default）；语音持久化只挂 voices
      - ./pallas-bot/resource/voices:/app/resource/voices
      - ./pallas-bot/config/pallas.toml:/app/config/pallas.toml
      # 协议端实例、WebUI 配置（webui.json）、控制台口令等（见 docs/developer/architecture/config-storage.md）
      - ./pallas-bot/data:/app/data
      # 站点自有插件（见 local/README.md、docs/maintainer/deploy/upgrade.md）
      - ./pallas-bot/local/plugins:/app/local/plugins
      # Linux 且协议端使用「Docker 模式」拉起 NapCat 时再取消注释（挂载 Docker socket 有安全风险，生产请加固）
      # - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      mongodb:
        condition: service_healthy
      postgres:
        condition: service_healthy
        required: false

  mongodb:
    container_name: mongodb
    image: mongo:8.0.10-noble
    restart: always
    ports:
      - 27017:27017
    environment:
      TZ: Asia/Shanghai
      wiredTigerCacheSizeGB: 1.5
    networks:
      - pallasbot
    volumes:
      - ./mongo/data:/data/db
      - ./mongo/logs:/var/log/mongodb
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  postgres:
    profiles: ["postgres"]
    container_name: pallasbot_postgres
    image: postgres:16-alpine
    restart: always
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_stat_statements
      - -c
      - track_io_timing=on
      - -c
      - idle_in_transaction_session_timeout=15s
    # 与 Bot 共用 compose.env 里的 PG_*：由 compose 插值写入镜像所需 POSTGRES_*（见文件首条注释）
    environment:
      TZ: Asia/Shanghai
      POSTGRES_USER: ${PG_USER:-pallas}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-pallas}
      POSTGRES_DB: ${PG_DB:-PallasBot}
    networks:
      - pallasbot
    volumes:
      # 若曾用旧默认库名初始化过，改 PG_DB/POSTGRES_DB 不会自动变库；需删本目录重建或手动 CREATE DATABASE（见 DockerDeployment.md 排障）
      - ./postgres/data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

networks:
  pallasbot:
